# ==============================
# SERVER
# ==============================
server.port=8080

# ==============================
# DATABASE - Supabase PostgreSQL
# ==============================
# Substitua com suas credenciais do Supabase:
# Project Settings > Database > Connection String (JDBC)

spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?user=postgres.btiyteqfytudpbswxgzd&sslmode=require
spring.datasource.username=postgres.btiyteqfytudpbswxgzd
spring.datasource.password=${PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
